# ═══════════════════════════════════════════════
# Profil DEV — Connexion locale PostgreSQL + Redis
# ═══════════════════════════════════════════════

spring:
  # ── DataSource ─────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:rdvmindset}
    username: ${POSTGRES_USER:dev_user}
    password: ${POSTGRES_PASSWORD:dev_password_123}
    driver-class-name: org.postgresql.Driver

  # ── JPA (override) ────────────────────────
  jpa:
    show-sql: true

  # ── Redis ──────────────────────────────────
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}

# ── Logging ────────────────────────────────
logging:
  level:
    com.rdvmindset: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

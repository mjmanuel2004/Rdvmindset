# ═══════════════════════════════════════════════
# RdvMindset — Configuration Spring Boot
# ═══════════════════════════════════════════════

spring:
  application:
    name: rdvmindset-backend

  # ── JPA / Hibernate ────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Europe/Paris

  # ── Flyway ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Mail ───────────────────────────────────
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── Security & OAuth2 (Keycloak) ───────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/rdvmindset}

# ── Server ─────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── Actuator ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  encryption:
    key: ${ENCRYPTION_KEY:CleSecreteSuperLonguePourAES256!}
  keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9090}
    realm: ${KEYCLOAK_REALM:rdvmindset}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  google:
    client-id: ${GOOGLE_CLIENT_ID:google-client-id-placeholder}
    client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/oauth2/google/callback}

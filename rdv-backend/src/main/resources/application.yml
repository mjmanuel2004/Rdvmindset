# ═══════════════════════════════════════════════
# RdvMindset — Configuration Spring Boot
# ═══════════════════════════════════════════════

spring:
  application:
    name: rdvmindset-backend

  # ── JPA / Hibernate ────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Europe/Paris

  # ── Flyway ─────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Mail ───────────────────────────────────
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ── Server ─────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── Actuator ───────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# ── JWT ────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:RdvMindsetSuperSecretKeyPourJWT2026DevEnvironnement}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  encryption:
    key: ${ENCRYPTION_KEY:CleSecreteSuperLonguePourAES256!}
